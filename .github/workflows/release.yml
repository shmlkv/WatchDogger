name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4

      - name: Build app
        run: |
          chmod +x build.sh
          ./build.sh

      - name: Create ZIP artifact
        run: |
          ditto -c -k --keepParent WatchDogger.app WatchDogger.zip

      - name: Create DMG artifact
        run: |
          hdiutil create -volname WatchDogger -srcfolder WatchDogger.app -ov -format UDZO WatchDogger.dmg

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            WatchDogger.zip
            WatchDogger.dmg
